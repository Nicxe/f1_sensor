name: Sync main back to content after docs/blueprint merge

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "blueprints/**"

permissions:
  contents: write

concurrency:
  group: sync-content-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-content:
    name: Sync main back to content branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force push main to content
        run: git push origin main:content --force
