name: Sync main back to beta and content

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sync-beta:
    if: ${{ github.event.release.prerelease == false && github.event.release.target_commitish == 'main' }}
    uses: nicxe/.github/.github/workflows/resusable-sync-main-back-to-beta.yml@main
    secrets: inherit

  sync-content:
    if: ${{ github.event.release.prerelease == false && github.event.release.target_commitish == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force push main to content
        run: git push origin main:content --force
