name: Release

on:
  push:
    branches: [beta, main]
    paths:
      - ".github/workflows/release.yml"
      - "custom_components/**"
      - "hacs.json"
      - "package-lock.json"
      - "package.json"
      - "release.config.cjs"

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: nicxe/.github/.github/workflows/reusable-release.yml@main
    with:
      node_version: "22"
    secrets: inherit
