name: 🐞 Bug Report
description: Report a problem with F1 Sensor
title: "[Bug]: "
labels: ["bug"]
assignees: ["Nicxe"]
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I am running the latest version of F1 Sensor
          required: true
        - label: I have searched existing issues
          required: true
        - label: I have restarted Home Assistant
          required: true
        - label: All information in this issue, including logs and screenshots, is written in English. Issues containing non-English content will be closed without response.
          required: true

  - type: input
    id: version
    attributes:
      label: F1 Sensor Version
      placeholder: e.g. 3.0.0
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of F1 Sensor is affected?
      options:
        - Integration
        - Live data card
        - Blueprint
        - Both integration and card
        - Not sure
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: What device are you running Home Assistant on?
      placeholder: e.g. Raspberry Pi 4, Intel NUC, VM on Proxmox
    validations:
      required: true

  - type: dropdown
    id: installation_type
    attributes:
      label: Home Assistant Installation Type
      description: How is Home Assistant installed?
      options:
        - Home Assistant OS
        - Home Assistant Container
        - Home Assistant Core
        - Supervised
    validations:
      required: true

  - type: input
    id: architecture
    attributes:
      label: System Architecture
      description: If running in Container or VM, what architecture is it?
      placeholder: e.g. aarch64, armv7, amd64

  - type: dropdown
    id: card_install_path
    attributes:
      label: Card Install Path
      description: Only needed for live data card issues.
      options:
        - Bundled with F1 Sensor
        - Standalone HACS dashboard repo
        - Manual resource
        - Not sure

  - type: input
    id: dashboard_resource_url
    attributes:
      label: Dashboard Resource URL
      description: Only needed for live data card issues. Add the resource URL if it is visible in your dashboard resources.
      placeholder: e.g. /local/f1-sensor-live-data-card/f1-sensor-live-data-card.js

  - type: input
    id: browser_device
    attributes:
      label: Browser and Device
      description: Only needed for live data card issues.
      placeholder: e.g. Chrome on Windows, Safari on iPhone, Fully Kiosk on tablet

  - type: textarea
    id: screenshot_or_recording
    attributes:
      label: Screenshot or Screen Recording
      description: Only needed for live data card display issues. Drag and drop images or recordings here.

  - type: input
    id: old_standalone_card_version
    attributes:
      label: Old Standalone Card Version
      description: Only fill this in if the standalone HACS dashboard card is still installed.
      placeholder: e.g. 1.4.0

  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behavior
      description: What is happening?
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Enable Debug Logging for F1 Sensor

        Before submitting a bug report, please enable debug logging:

        1. Go to **Settings → Devices & Services → Integrations**
        2. Find **F1 Sensor** and click the three dots → **Enable Debug Logging**
        3. Restart Home Assistant
        4. Reproduce the issue
        5. Go to **Settings → System → Logs**
        6. Download the full log or copy the relevant part for F1 Sensor

        Paste the debug log below.

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant Home Assistant logs
      render: shell
